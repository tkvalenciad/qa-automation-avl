# Kafka local ligero (Redpanda, 100% compatible con el protocolo Kafka) para la
# capa de eventos de telemetria. Un solo contenedor, sin ZooKeeper.
#
# Uso:
#   docker compose up -d
#   pip install -r event_tests/requirements-events.txt
#   pytest event_tests/tests -v
#
# El topic `gps-raw-events` se crea automaticamente al publicar el primer evento.
services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: qa-kafka
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10
